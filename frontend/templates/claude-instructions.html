<!-- Claude Instructions Viewer -->
<div class="category">
    <div id="ci-toolbar" style="display: flex; gap: 12px; margin-bottom: 16px; align-items: center;">
        <button id="ci-btn-browser" class="btn btn-sm active" onclick="window.CIModule.setView('browser')">Browser</button>
        <button id="ci-btn-graph" class="btn btn-sm" onclick="window.CIModule.setView('graph')">Logigramme</button>
        <span id="ci-stats" style="margin-left: auto; font-size: 0.85em; color: #9ca3af;"></span>
    </div>

    <!-- Browser View -->
    <div id="ci-browser-view" style="display: flex; gap: 16px; min-height: 500px;">
        <!-- Tree panel -->
        <div id="ci-tree-panel" style="width: 280px; min-width: 240px; border-right: 1px solid var(--border-color, #e5e7eb); padding-right: 16px; overflow-y: auto; max-height: 70vh;">
            <p style="color: #666; text-align: center; padding: 20px;">Chargement...</p>
        </div>
        <!-- File viewer panel -->
        <div id="ci-file-panel" style="flex: 1; overflow-y: auto; max-height: 70vh; padding-left: 8px;">
            <div style="text-align: center; padding: 60px 20px; color: #9ca3af;">
                Selectionnez un fichier dans l'arbre pour le visualiser.
            </div>
        </div>
    </div>

    <!-- Graph View -->
    <div id="ci-graph-view" style="display: none; min-height: 500px;">
        <svg id="ci-graph-svg" width="100%" height="600" style="border: 1px solid var(--border-color, #e5e7eb); border-radius: 8px; background: var(--card-bg, #fafafa);"></svg>
    </div>
</div>
