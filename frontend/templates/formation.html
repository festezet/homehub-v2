<!-- Formation Tab - Plan d'action DeepSignal V1 -->
<div class="formation-container">
    <!-- Sub-tab Navigation -->
    <div class="formation-subtabs">
        <button class="formation-subtab active" data-subtab="plan" onclick="window.formationModule.switchSubTab('plan')">
            Plan d'action
        </button>
        <button class="formation-subtab" data-subtab="skool" onclick="window.formationModule.switchSubTab('skool')">
            Contenu Skool
        </button>
        <button class="formation-subtab" data-subtab="apercu" onclick="window.formationModule.switchSubTab('apercu')">
            Apercu Skool
        </button>
    </div>

    <!-- Sub-tab: Plan d'action -->
    <div class="formation-subtab-content active" id="formation-tab-plan">
        <!-- Progress Header -->
        <div class="formation-header">
            <div class="formation-progress-info">
                <h3>DeepSignal V1 - Plan d'action</h3>
                <span class="formation-deadline">Deadline : semaine 6 (~10 mars 2026)</span>
            </div>
            <div class="formation-progress-bar-container">
                <div class="formation-progress-bar" id="formation-progress-bar" style="width: 0%"></div>
                <span class="formation-progress-text" id="formation-progress-text">0/7</span>
            </div>
        </div>

        <!-- Actions List -->
        <div class="formation-actions" id="formation-actions">
            <div class="loading-state">
                <p>Chargement du plan d'action...</p>
            </div>
        </div>
    </div>

    <!-- Sub-tab: Contenu Skool -->
    <div class="formation-subtab-content" id="formation-tab-skool">
        <div class="skool-header" id="skool-header">
            <div class="loading-state">
                <p>Chargement du contenu Skool...</p>
            </div>
        </div>
        <div class="skool-week-tabs" id="skool-week-tabs"></div>
        <div class="skool-videos" id="skool-videos"></div>
    </div>

    <!-- Sub-tab: Apercu Skool -->
    <div class="formation-subtab-content" id="formation-tab-apercu">
        <div class="apercu-layout">
            <aside class="apercu-sidebar" id="apercu-sidebar">
                <div class="loading-state">
                    <p>Chargement...</p>
                </div>
            </aside>
            <main class="apercu-main" id="apercu-main">
                <div class="apercu-placeholder">
                    <p>Selectionnez une lecon dans la sidebar</p>
                </div>
            </main>
        </div>
    </div>
</div>
