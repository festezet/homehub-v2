<!-- Life Tasks Page -->
<div class="life-tasks-page">
    <!-- Stats -->
    <div class="grid grid-4" id="lt-stats">
        <div class="card stat-card">
            <div class="stat-value" id="lt-stat-active">-</div>
            <div class="stat-label">Actives</div>
        </div>
        <div class="card stat-card">
            <div class="stat-value" id="lt-stat-overdue" style="color: var(--danger, #f38ba8)">-</div>
            <div class="stat-label">En retard</div>
        </div>
        <div class="card stat-card">
            <div class="stat-value" id="lt-stat-completed" style="color: var(--success, #a6e3a1)">-</div>
            <div class="stat-label">Completees</div>
        </div>
        <div class="card stat-card">
            <div class="stat-value" id="lt-stat-total">-</div>
            <div class="stat-label">Total</div>
        </div>
    </div>

    <!-- Filters -->
    <div class="card" style="margin-bottom: 16px;">
        <div class="card-body" style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
            <select id="lt-filter-category" class="form-select" style="width: auto;">
                <option value="">Toutes categories</option>
                <option value="repair">Reparation/SAV</option>
                <option value="travel">Voyage</option>
                <option value="admin">Demarche admin</option>
                <option value="health">Sante</option>
                <option value="purchase">Achat</option>
                <option value="event">Evenement</option>
            </select>
            <select id="lt-filter-status" class="form-select" style="width: auto;">
                <option value="active">Actives</option>
                <option value="">Toutes</option>
                <option value="completed">Completees</option>
                <option value="cancelled">Annulees</option>
            </select>
            <button class="btn btn-primary" onclick="window.LifeTasksModule.showCreateModal()">+ Nouvelle tache</button>
        </div>
    </div>

    <!-- Tasks List -->
    <div id="lt-tasks-container">
        <p style="text-align: center; padding: 40px; color: #888;">Chargement...</p>
    </div>
</div>

<!-- Create/Edit Modal -->
<div id="lt-modal" class="lt-modal-overlay" style="display: none;" onclick="if(event.target===this) window.LifeTasksModule.closeModal()">
    <div class="lt-modal">
        <div class="lt-modal-header">
            <h3 id="lt-modal-title">Nouvelle Life Task</h3>
            <button class="btn btn-icon" onclick="window.LifeTasksModule.closeModal()">&times;</button>
        </div>
        <div class="lt-modal-body">
            <input type="hidden" id="lt-edit-id">
            <div class="form-group">
                <label>Titre *</label>
                <input type="text" id="lt-input-title" class="form-control" placeholder="Ex: Telephone casse, Voyage FOWT...">
            </div>
            <div class="form-group">
                <label>Categorie *</label>
                <div id="lt-category-grid" class="lt-category-grid"></div>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                <div class="form-group">
                    <label>Priorite</label>
                    <select id="lt-input-priority" class="form-select">
                        <option value="P1-Urgent">P1 - Urgent</option>
                        <option value="P2-High">P2 - High</option>
                        <option value="P3-Normal" selected>P3 - Normal</option>
                        <option value="P4-Low">P4 - Low</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Deadline</label>
                    <input type="date" id="lt-input-due-date" class="form-control">
                </div>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="lt-input-description" class="form-control" rows="2" placeholder="Details optionnels..."></textarea>
            </div>
        </div>
        <div class="lt-modal-footer">
            <button class="btn" onclick="window.LifeTasksModule.closeModal()">Annuler</button>
            <button class="btn btn-primary" onclick="window.LifeTasksModule.submitTask()">Creer</button>
        </div>
    </div>
</div>
